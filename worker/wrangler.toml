name = "fuelio-hub-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ダッシュボードで設定した環境変数(Variables)が、GitHub経由の再デプロイで
# 上書きされないようにする設定。
keep_vars = true

[[d1_databases]]
binding = "DB"
database_name = "fuelio-hub-db"
database_id = "b95e13e7-65bc-4eaf-adad-2ab3c91967f0"

[vars]
# 機密情報（JWT_SECRET等）はこのファイルに一切記述しません。
# Cloudflareダッシュボードの Settings > Variables で "Encrypt" をONにして設定してください。
# ここに同名の変数を書くと、デプロイのたびにダッシュボードのSecretがこの値で上書きされてしまうため、
# 意図的に記述していません。
FRONTEND_URL = "https://your-app.vercel.app"

# Workers AI for OCR (optional)
# [[ai]]
# binding = "AI"
